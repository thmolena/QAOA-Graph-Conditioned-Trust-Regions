name: Package CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: code/pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install -e "./code[test]"
      - name: Run tests
        run: python -m pytest code/tests -q

  distribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install build twine
          python -m build code
          python -m twine check code/dist/*
      - name: Verify wheel import and console entry point
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python -m pip install "$GITHUB_WORKSPACE"/code/dist/*.whl
          python -m pip check
          python -c "import specops_gctr; print(specops_gctr.__version__)"
          gctr-optimize --version
          gctr-reproduce --help
          gctr-optimize --family er --n 4 --budget 4 --json
          gctr-reproduce --replot-only \
            --source-data-dir "$GITHUB_WORKSPACE/manuscript/source_data" \
            --figures-dir "$RUNNER_TEMP/gctr-figures" \
            --tables-dir "$RUNNER_TEMP/gctr-tables"
      - name: Verify synchronized release metadata
        run: |
          python - <<'PY'
          import re, tomllib
          from pathlib import Path
          import specops_gctr
          root = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          code = tomllib.loads(Path("code/pyproject.toml").read_text())["project"]
          cff = re.search(r"(?m)^version:\s*([^\s]+)", Path("CITATION.cff").read_text()).group(1)
          assert root == code, "root and code project metadata differ"
          assert root["version"] == cff == specops_gctr.__version__
          assert Path("LICENSE").read_bytes() == Path("code/LICENSE").read_bytes()
          PY

  released-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/pyproject.toml
      - name: Install released package
        run: python -m pip install "./code[test]"
      - name: Validate committed evidence and provenance
        run: gctr-reproduce --manuscript-dir "$GITHUB_WORKSPACE/manuscript" --validate-only

  root-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify repository-root installation
        run: |
          python -m pip install build twine
          python -m build --outdir root-dist .
          python -m twine check root-dist/*
          python -m pip install .
          python -c "from specops_gctr import GCTRPolicyModel, make_instance; print(make_instance('ba', 2, 0).maxcut)"
          gctr-optimize --family rr --n 4 --budget 4 --json
