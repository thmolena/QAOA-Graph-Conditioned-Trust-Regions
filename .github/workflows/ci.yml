name: Package CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest tests -q

  distribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install build twine
          python -m build .
          python -m twine check dist/*
      - name: Verify wheel import and console entry point
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python -m pip install "$GITHUB_WORKSPACE"/dist/*.whl
          python -m pip check
          python -c "import specops_gctr; print(specops_gctr.__version__)"
          gctr-optimize --version
          gctr-reproduce --help
          gctr-optimize --family er --n 4 --budget 4 --json
          python "$GITHUB_WORKSPACE/run.py" optimize --version
          python "$GITHUB_WORKSPACE/run.py" reproduce --help
          gctr-reproduce --replot-only \
            --source-data-dir "$GITHUB_WORKSPACE/manuscript/source_data" \
            --figures-dir "$RUNNER_TEMP/gctr-figures" \
            --tables-dir "$RUNNER_TEMP/gctr-tables"
      - name: Verify synchronized release metadata
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path
          import specops_gctr
          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          assert project["version"] == specops_gctr.__version__
          assert Path("LICENSE").is_file()
          PY

  released-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install released package
        run: python -m pip install ".[test]"
      - name: Validate committed evidence and provenance
        run: gctr-reproduce --manuscript-dir "$GITHUB_WORKSPACE/manuscript" --validate-only
